<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="robots" content="nofollow,noindex" />
        <title>404 - メカトロニクス研究部会</title>
        <script>
            'use strict';
            const SEGMENT_COUNT = 0;
            const origin = location.origin;
            const segments = location.href.slice(origin.length + 1).split('/');
            const repo = segments.slice(0, SEGMENT_COUNT).join('/');
            const param = segments.slice(SEGMENT_COUNT).join('/');
            location.replace(`${origin}/${repo}?p=${encodeURIComponent(param)}`);
        </script>
    </head>
</html>
