        <title>メカトロニクス研究部会</title>
        <script>
            (() => {
                'use strict';
                const query = location.search;
                if(!query) return;
                const GET = query.slice(1).split('&').reduce((prev, curr) => {
                    const pair = curr.split('=');
                    prev[pair[0]] = pair[1];
                    return prev;
                }, {});
                if(GET['p'] && !Number.isNaN(Number(GET['p']))) history.replaceState(null, null, decodeURIComponent(GET['p']));
            })();
        </script>
    </head>
    <body>
        <div id="root" class="body"></div>
        <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
        <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
        <script src="https://unpkg.com/react-router-dom@6.8.1/dist/umd/react-router-dom.production.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/react-helmet@6.1.0/lib/Helmet.min.js"></script>
        <script src="/js/index.bundle.min.js"></script>
        <script async src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
